version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      ignore:
          # Major upgrades are reviewed and bumped manually. Security updates
          # are unaffected by update-types filters — they ship via a separate
          # channel that respects only by-name ignores below.
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
          # LSP client/server/protocol must move together — bumping any one
          # of these independently breaks ExecuteCommandRequest overloads and
          # other API surface (see AGENTS.md "Pinned dependency constraints").
          # Bumped manually as a triplet.
          - dependency-name: "vscode-languageclient"
          - dependency-name: "vscode-languageserver"
          - dependency-name: "vscode-languageserver-protocol"
          # uuid: transitive devDep via @vscode/vsce > @azure/identity >
          # @azure/msal-node (packaging-only, never executed at runtime).
          # GHSA-w5hq-g745-h8pq is patched in uuid@14, but msal-node@5.x pins
          # uuid@^8 and was written against the pre-v9 default-export API; an
          # override to v14 would break it. The vulnerable code path is in
          # v3/v5/v6 with an explicit buf argument; msal-node uses v4. Revisit
          # when msal-node bumps its uuid pin upstream.
          - dependency-name: "uuid"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
