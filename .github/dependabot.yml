version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      ignore:
          # Track Node.js LTS only; bump manually when moving to the next LTS major.
          - dependency-name: "@types/node"
            update-types: ["version-update:semver-major"]

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
