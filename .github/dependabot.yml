version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      ignore:
          # Major upgrades are reviewed and bumped manually. Security updates
          # are unaffected — they ship via a separate dependabot channel that
          # bypasses ignore rules.
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          minor-and-patch:
              update-types:
                  - "minor"
                  - "patch"
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
