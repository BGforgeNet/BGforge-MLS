name: "Build"

on:
    pull_request:
    push:

# Cancel superseded runs on the same ref. Release-tag runs use distinct refs
# (refs/tags/vX.Y.Z) and are not affected; PR pushes and branch pushes get the
# stale run cancelled when a newer push arrives.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
    contents: write
    id-token: write

jobs:
    build:
        name: build
        runs-on: ubuntu-latest
        outputs:
            # base64-encoded sha256 digests of release artifacts, consumed by the
            # SLSA provenance job.  Empty on non-release runs.
            artifact-subjects: ${{ steps.artifact-hashes.outputs.subjects }}
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Verify supply-chain invariants
              run: ./scripts/verify-supply-chain.sh

            - name: Install xvfb (release only)
              if: startsWith(github.ref, 'refs/tags/')
              run: sudo apt-get install -y xvfb

            - name: Install pnpm
              uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build tree-sitter grammar
              run: pnpm build:grammar

            - name: Test
              run: pnpm test:all

            - name: Build
              run: pnpm build

            # E2E needs xvfb and a full Electron host, so it runs only on release tags.
            # On every PR/push, the webview-bundle tests in client/test/ and the server
            # stdio smoke test (server/vitest.smoke.config.ts, driven by scripts/test.sh
            # Phase 3) cover the same surfaces the E2E driver would exercise.
            - name: E2E tests (release only)
              if: startsWith(github.ref, 'refs/tags/')
              run: pnpm test:e2e

            - name: Package
              run: |
                  if [[ "$GITHUB_REF" != refs/tags/* ]]; then
                    export ARTIFACT_VERSION="${GITHUB_SHA::7}"
                  fi
                  pnpm package
                  echo "VSIX_PATH=$(ls dist/*.vsix)" >> "$GITHUB_ENV"

            - name: Generate CycloneDX SBOM (release only)
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  set -euo pipefail
                  pnpm dlx @cyclonedx/cyclonedx-npm@4.2.1 --output-file dist/sbom.cdx.json

            - name: Build editor bundles (TextMate, Kate, Notepad++, Geany)
              run: pnpm build:editors

            - name: Upload build
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: "!startsWith(github.ref, 'refs/tags/')"
              with:
                  name: bgforge-mls
                  path: dist/
                  # Default 90-day retention is excessive for branch builds;
                  # 14 days is enough for a developer to inspect a CI artifact
                  # produced from a recent push or PR.
                  retention-days: 14

            # Use pre-built VSIX for publishing: pnpm package (scripts/package.sh)
            # dereferences pnpm symlinks that vsce can't follow.
            - name: Publish to Open VSX Registry
              if: "startsWith(github.ref, 'refs/tags/')"
              uses: HaaLeo/publish-vscode-extension@4004fc217b5ac892b15a1c3cbe6458de97242dde # v2
              id: publishToOpenVSX
              with:
                  pat: ${{ secrets.OPEN_VSX_TOKEN }}
                  extensionFile: ${{ env.VSIX_PATH }}

            - name: Publish to Visual Studio Marketplace
              if: "startsWith(github.ref, 'refs/tags/')"
              uses: HaaLeo/publish-vscode-extension@4004fc217b5ac892b15a1c3cbe6458de97242dde # v2
              with:
                  pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
                  registryUrl: https://marketplace.visualstudio.com
                  extensionFile: ${{ steps.publishToOpenVSX.outputs.vsixPath }}

            - name: Publish server to npm
              if: startsWith(github.ref, 'refs/tags/')
              run: SKIP_BUILD=1 ./scripts/publish-server.sh
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Compute artifact hashes for SLSA provenance (release only)
              id: artifact-hashes
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  set -euo pipefail
                  # sha256sum emits "<hash>  <filename>" lines; slsa-github-generator
                  # expects base64(sha256sum-output) as base64-subjects.
                  subjects="$(sha256sum \
                    "${{ steps.publishToOpenVSX.outputs.vsixPath }}" \
                    dist/sbom.cdx.json \
                    dist/*.zip \
                    | base64 -w0)"
                  echo "subjects=$subjects" >> "$GITHUB_OUTPUT"

            - name: GitHub Release
              if: "startsWith(github.ref, 'refs/tags/')"
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
              with:
                  name: ${{ github.ref_name }}
                  fail_on_unmatched_files: true
                  files: |
                      ${{ steps.publishToOpenVSX.outputs.vsixPath }}
                      dist/*.zip
                      dist/sbom.cdx.json

    provenance:
        name: SLSA provenance
        needs: build
        # Only generate provenance for successful release-tag builds.
        if: >-
            needs.build.result == 'success' &&
            startsWith(github.ref, 'refs/tags/')
        permissions:
            id-token: write
            contents: write
            actions: read
        # MUST be pinned to a full @vX.Y.Z tag, NOT a commit SHA, despite the
        # rest of this workflow's third-party-action SHA-pinning convention.
        # slsa-verifier validates the workflow_ref recorded in the provenance
        # attestation against the trusted builder's published tag — pinning by
        # SHA would make the resulting attestation unverifiable. See
        # https://github.com/slsa-framework/slsa-github-generator README.
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
        with:
            base64-subjects: ${{ needs.build.outputs.artifact-subjects }}
