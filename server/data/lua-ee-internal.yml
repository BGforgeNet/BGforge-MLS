          detail: createPartyScreen:OnBackButtonClick()
          doc: |-
              Event action for when the ``Back`` button is clicked.

              **Notes**

              - Returns to previous menu when the back button is clicked.
              - Calls the `tolua_BaldurLUA_CScreenCreateParty_OnBackButtonClick00` function which calls the `CScreenCreateParty::OnBackButtonClick` method.

        - name: createPartyScreen:OnCreateDeleteButtonClick
          detail: createPartyScreen:OnCreateDeleteButtonClick()
          doc: |-
              Event action for when the ``Delete`` button is clicked.

              **Parameters**

              * ``integer`` *Index* -> 0 based index of created character's delete button clicked.

              **Notes**

              - The selected character, that has been previously created, is deleted when this button is clicked.
              - Calls the `tolua_BaldurLUA_CScreenCreateParty_OnCreateDeleteButtonClick00` function which calls the `CScreenCreateParty::OnCreateDeleteButtonClick` method.

        - name: createPartyScreen:OnDoneButtonClick
          detail: createPartyScreen:OnDoneButtonClick()
          doc: |-
              Event action for when the ``Done`` button is clicked.

              **Notes**

              - Finishes the create party process.
              - Calls the `tolua_BaldurLUA_CScreenCreateParty_OnDoneButtonClick00` function which calls the `CScreenCreateParty::OnDoneButtonClick` method.

        - name: createPartyScreen:OnPortraitButtonClick
          detail: createPartyScreen:OnPortraitButtonClick(Index)
          doc: |-
              Event action for when a portrait button is clicked.

              **Parameters**

              * ``integer`` *Index* -> 0 based index of portrait clicked.

              **Notes**

              - Selects the character for the portrait that is clicked.
              - Lua arrays use 1 based index when accessing arrays.
              - Calls the `tolua_BaldurLUA_CScreenCreateParty_OnPortraitButtonClick00` function which calls the `CScreenCreateParty::OnPortraitButtonClick` method.

