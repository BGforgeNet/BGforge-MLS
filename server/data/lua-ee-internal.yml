C:
    type: 3
    items:
        - name: C:AddGold
          detail: C:AddGold(Gold)
          doc: |-
              Adds/removes gold to/from the party (f.i.: `C:AddGold("1000")` will add 1000 gold to the party, `C:AddGold("-1000")` will remove 1000 gold from the party).

        - name: C:AddSpell
          detail: C:AddSpell(SpellName)
          doc: |-
              Adds a spell to the specified character (f.i.: `C:AddSpell("SPWI112")`). Keep in mind that:
              - Spell resource reference (`ResRef`) used in `SpellName` must be 8 characters or less and must be valid.
              - A character must be selected for this to work.

        - name: C:AdvanceRealTime
          detail: C:AdvanceRealTime(GameTime)
          doc: |-
              Advance time.

              **Parameters**

              * ``integer`` *GameTime* -> amount of time in milliseconds to advance.

              **Example**

              Speed up 1 hour real time: `C:AdvanceRealTime(60000)`.

        - name: C:CreateCreature
          detail: C:CreateCreature(CreatureName)
          doc: |-
              Spawns the creature specified.

              **Parameters**

              * ``string`` *CreatureName* -> string containing resource reference (`ResRef`) of creature to spawn.

              **Notes**

              Creature resource reference (`ResRef`) used in *CreatureName* must be 8 characters or less and must be valid.

              This spawns a creature to the center of the screen (or nearest valid point).

              **Example**

              Spawn a gibberling using ``GIBBER.CRE``: `C:CreateCreature("GIBBER")`.

        - name: C:CreateEngine
          detail: C:CreateEngine(nEngine)
          doc: |-
              Unknown - seems to start a new single ``0`` or multi ``1`` player game.

        - name: C:CreateItem
          detail: C:CreateItem(ItemName,Usage)
          doc: |-
              Create an item.

              **Parameters**

              * ``string`` *ItemName* -> string containing resource reference (`ResRef`) of the item to create.
              * ``integer`` *Usage* -> amount / charges (optional parameter).

              **Notes**

              Item resource reference (`ResRef`) used in *ItemName* must be 8 characters or less and must be valid.

              This spawns an item, based on its item file name, or a stack of the same item, in the inventory of the current party leader.

              **Examples**

              - Create a long sword: `C:CreateItem("SW1H01")`.
              - Create 10 potions of cure light wounds: `C:CreateItem("POTN08", 10)`.
              - Greenstone Amulet with 50 charges: `C:CreateItem("amul17", 50)`.

        - name: C:CreateVEFVidCell
          detail: C:CreateVEFVidCell(VidCell)
          doc: |-
              Create `VEFVidCell`.

              **Parameters**

              * ``string`` *VidCell* -> string containing resource reference (`ResRef`) of `VEFVidCell` to create.

        - name: C:DisplayAllBAMFiles
          detail: C:DisplayAllBAMFiles()
          doc: |-
              Display all `BAM` files.

        - name: C:DisplayText
          detail: C:DisplayText(text)
          doc: |-
              Displays the specified text on screen.

              **Parameters**

              * ``string`` *text* -> string containing text to display.

              **Example**

              `C:DisplayText("This is some text to display")`.

        - name: C:EnableCheatKeys
          detail: C:EnableCheatKeys()
          doc: |-
              Enables cheat keys.

              **Notes**

              The following cheat key combination are available once cheat keys has been enabled:

              | **Key** | **Notes** |
              | --- | --- |
              | CTRL+1 | Change armor level animation |
              | CTRL+2 | Fade screen to black |
              | CTRL+3 | Fade screen to normal |
              | CTRL+4 | Highlight background-interactive objects |
              | CTRL+5 | Displays animation information |
              | CTRL+6 | Change avatar animation previous |
              | CTRL+7 | Change avatar animation next |
              | CTRL+8 | Highlights the text boxes |
              | CTRL+9 | Highlight the sprites |
              | CTRL+0 | Unknown |
              | CTRL+A | Change Selected Animation Sequence |
              | CTRL+C | Jump to next chapter |
              | CTRL+D | Display some numbers (framerate related?) |
              | CTRL+E | Alters visual range |
              | CTRL+F | Turn the character |
              | CTRL+G | Display loaded area ref |
              | CTRL+I | Play Selected Animation effect |
              | CTRL+J | Teleport to cursor position |
              | CTRL+K | Creature under cursor kick out party |
              | CTRL+L | Play Selected Animation effect |
              | CTRL+M | (Followed by ENTER) Debug Dump |
              | CTRL+N | Freeze screen for 5 seconds |
              | CTRL+O | (Followed by ENTER) Write Debug To Log |
              | CTRL+P | Center screen on selected character |
              | CTRL+Q | Creature under cursor joins party |
              | CTRL+R | Heals character under cursor |
              | CTRL+S | Change Selected Animation Sequence |
              | CTRL+T | Advances game time by 1 hour |
              | CTRL+U | Highlight doors and ground objects |
              | CTRL+X | Extended position information |
              | CTRL+Y | Kills creature under cursor |

              In addition `CTRL+8` during character creation will set all attributes to 18 (STR 18/100).
                - See also ``createCharScreen:OnCheatyMcCheaterson``.

              `CTRL+SHIFT+Z` while hovering over a character will grant every spell file in the game - may crash due to invalid spells.

        - name: C:Eval
          detail: C:Eval(Script)
          doc: |-
              Evaluate a string containing script actions for a character.

              **Parameters**

              * ``string`` *Script* -> string containing script actions to evaluate.

              **Notes**

              The whole string can be enclosed into single quotes (`'`) so that double quotes can still be used within the script action.

              **Example**

              Move Cernd to the specified location using evaluated script actions.
                - `C:Eval("ActionOverride(\"Cernd\",MoveGlobal(\"AR0406\",Myself,[1368.1922]))")`.

        - name: C:Exec
          detail: C:Exec(File)
          doc: |-
              Execute console commands contained in the specified file.

              **Parameters**

              * ``string`` *File* -> string containing filename to execute.

              **Example**

              Execute all the commands in the file ``test.txt``: `C:Exec("test.txt")`.

        - name: C:ExploreArea
          detail: C:ExploreArea()
          doc: |-
              Reveals the entire map for the current area.

              **Notes**

              This doesn't remove the fog of war; if a creature is out of your field of vision it will still remain hidden.

        - name: C:GetGlobal
          detail: C:GetGlobal(VariableName,AreaName)
          doc: |-
              Gets a global variable value.

              **Parameters**

              * ``string`` *VariableName* -> string containing the name of the global variable to retrieve the value of.
              * ``string`` *AreaName* -> string containing the resource reference (`ResRef`) of the area in which the variable is stored, or ``"GLOBAL"`` for all.

              **Returns**

              Value of the variable specified.

              **Notes**

              Area resource reference (`ResRef`) used in *AreaName* must be 8 characters or less and must be valid.

              **Examples**

              - Returns the value of ``CHAPTER`` variable: `C:GetGlobal("CHAPTER", "GLOBAL")`. Will display current `GLOBAL` setting.
              - Returns the value of ``TestValue`` variable stored in area ``AR0600.ARE``: `C:GetGlobal("TestValue", "AR0600")`.

        - name: C:LogMessages
          detail: C:LogMessages()
          doc: |-
              Enables logging output to console.

        - name: C:LogSet
          detail: C:LogSet(LogFile)
          doc: |-
              Sets logging to a file instead of to console if logging is enabled.

              **Parameters**

              * ``string`` *LogFile* -> string containing log filename.

        - name: C:MoveToArea
          detail: C:MoveToArea(Area)
          doc: |-
              Move the selected characters to the area specified.

              **Parameters**

              * ``string`` *Area* -> string containing the resource reference (`ResRef`) of the area to move players to.

              **Notes**

              Area resource reference (`ResRef`) used in *Area* must be 8 characters or less and must be valid.

              **Example**

              Move the selected players to the Friendly Arms Inn ``AR2300.ARE``: `C:MoveToArea("AR2300")`.

        - name: C:new
          detail: C:new()
          doc: |-
              Create a new instance of the CLUAConsole.

              **Notes**

              This is used in the game engine to assign ``C:`` to CLUAConsole: `C = CLUAConsole:new()`.

        - name: C:PickDialog
          detail: C:PickDialog(Table)
          doc: |-
              Unknown.

        - name: C:PlayMovie
          detail: C:PlayMovie(Movie)
          doc: |-
              Plays the specified movie.

              **Parameters**

              * ``string`` *Movie* - string containing resource reference (`ResRef`) of the movie to play.

              **Notes**

              Movie resource reference (`ResRef`) used in *Movie* must be 8 characters or less and must be valid.

              Plays WebM file format movies (``.wbm``).

              **Example**

              Plays ``LOGO.WBM``: `C:PlayMovie("LOGO")`.

        - name: C:PlaySound
          detail: C:PlaySound(Sound)
          doc: |-
              Plays the specified sound.

              **Parameters**

              * ``string`` *Sound* - string containing resource reference (`ResRef`) of the sound, music, voices to play.

              **Notes**

              Sound resource reference (`ResRef`) used in *Sound* must be 8 characters or less and must be valid.

              Plays WAV file format audio (``.wav``).

              **Example**

              Play cow moo sound ``COW01.WAV``: `C:PlaySound("COW01")`.

        - name: C:ResetAchievements
          detail: C:ResetAchievements()
          doc: |-
              Reset achievements.

              **Notes**

              Applies to Steam installation only!

        - name: C:SetCurrentXP
          detail: C:SetCurrentXP(ExperiencePoints)
          doc: |-
              Sets the experience points (XP) of the selected character.

              **Parameters**

              * ``string`` *ExperiencePoints* -> string containing the numeric value of experience points to set for selected character.

              **Notes**

              This sets the total, rather than adding a value to your current experience points. A level up will be triggered for characters that qualify, based on the experince points table for the character's class level.

              **Example**

              Set current character at 1000 experience points: `C:SetCurrentXP("1000")`.

        - name: C:SetGlobal
          detail: C:SetGlobal(VariableName,AreaName,Value)
          doc: |-
              Set a global variable to the specified value.

              **Parameters**

              * ``string`` *VariableName* -> string containing the name of the global variable to set.
              * ``string`` *AreaName* -> string containing the resource reference (`ResRef`) of the area in which the variable is stored, or ``"GLOBAL"`` for all.
              * ``integer`` *Value* -> new value to set the variable to.

              **Notes**

              Area resource reference (`ResRef`) used in *AreaName* must be 8 characters or less and must be valid.

              **Examples**

              - Set the value of ``CHAPTER`` to ``2`` (and advance to Chapter 2): `C:SetGlobal("CHAPTER", "GLOBAL", 2)`.
              - Sets the value of ``TestValue`` variable stored in area ``AR0600.ARE`` to ``16``: `C:GetGlobal("TestValue", "AR0600", 16)`.

        - name: C:SetWaterAlpha
          detail: C:SetWaterAlpha(AlphaLevel)
          doc: |-
              Sets the alpha blend level for water transparency.

              **Parameters**

              * ``integer`` *AlphaLevel* -> value to set for alpha blending of water transparency.

              **Notes**

              Not tested / verified!

              **Example**

              `C:SetWaterAlpha(100)`

        - name: C:SetWeather
          detail: C:SetWeather(WeatherID)
          doc: |-
              Sets the current weather.

              **Parameters**

              * ``string`` *WeatherID* -> string containing the weather id.

              **Notes**

              Not tested / verified: may be an ``integer`` value for *WeatherID*.

              Valid values to set can be found in ``WEATHER.IDS``:

              - `0 NOWEATHER`
              - `1 RAIN`
              - `2 SNOW`
              - `3 FOG`

              **Example**

              `C:SetWeather("1")`.

        - name: C:StartStore
          detail: C:StartStore(StoreName)
          doc: |-
              Starts the specified store.

              **Parameters**

              * ``string`` *StoreName* -> string containing resource reference (`ResRef`) of store to start.

              **Notes**

              - Store resource reference (`ResRef`) used in *StoreName* must be 8 characters or less and must be valid.
              - May be unstable, leading to crashes!

              **Example**

              `C:StartStore("INN0103")`.

        - name: C:StrrefOff
          detail: C:StrrefOff()
          doc: |-
              Strings are not displayed with their associated string reference (`StrRef`) id.

        - name: C:StrrefOn
          detail: C:StrrefOn()
          doc: |-
              Strings are displayed with their associated string reference (`StrRef`) id.

        - name: C:TestAllDialog
          detail: C:TestAllDialog()
          doc: |-
              Lists all dialog file in the game, and checks for errors.

        - name: C:WorkshopUpload
          detail: C:WorkshopUpload(ModuleName,ModulePath)
          doc: |-
              Upload a module to the Steam Workshop - Not tested or verified!

              **Parameters**

              * ``string`` *ModuleName* -> string containing name of the workshop module.
              * ``string`` *ModulePath* -> string containing the full filepath to the module to upload.

              **Notes**

              Applies to Steam installation only!

        - name: C:WriteScript
          detail: C:WriteScript(Folder)
          doc: |-
              Output scripts to directory.

              **Parameters**

              * ``string`` *Folder* -> string containing filepath of folder to output scripts to.

              **Notes**

              If the mouse is over a creature, the command will evaluate the scripts attached to that creature. Otherwise it will evaluate the area scripts.

              **Example**

              Output the script results to a folder called DebugScripts in the root of your game install: `C:WriteScript("DebugScripts")`.

chapterScreen:
    type: 3
    items:
        - name: chapterScreen:IsDoneButtonClickable
          detail: chapterScreen:IsDoneButtonClickable()
          doc: |-
              Determines if the ``Done`` button is enabled and clickable by user.

              **Returns**

              Returns true ``1`` if successful or false ``0`` otherwise.

              Pushes onto lua stack a lua boolean ``true`` if button is clickable or a lua boolean ``false`` otherwise.

              **Notes**

              - The lua ``action`` occurs if the button is enabled (clickable) and is clicked.
              - Calls the `tolua_BaldurLUA_CScreenChapter_IsDoneButtonClickable00` function.

              **Example**

              The ``Done`` button as defined in ``UI.MENU``:

              ```lua
              button
              {
                area 532 714 234 44
                bam GUIOSTUR
                text "DONE_BUTTON"
                text style "button"
                clickable lua "chapterScreen:IsDoneButtonClickable()"
                action
                "
                  chapterScreen:OnDoneButtonClick()
                "
              }
              ```

        - name: chapterScreen:IsReplayButtonClickable
          detail: chapterScreen:IsReplayButtonClickable()
          doc: |-
              Determines if the ``Replay`` button is enabled and clickable by user.

              **Returns**

              Returns true ``1`` if successful or false ``0`` otherwise.

              Pushes onto lua stack a lua boolean ``true`` if button is clickable or a lua boolean ``false`` otherwise.

              **Notes**

              - The lua ``action`` occurs if the button is enabled (clickable) and is clicked.
              - Calls the `tolua_BaldurLUA_CScreenChapter_IsReplayButtonClickable00` function.

              **Example**

              The ``Replay`` button as defined in ``UI.MENU``:

              ```lua
              button
              {
                area 280 714 234 44
                bam GUIOSTUL
                text "REPLAY_BUTTON"
                text style "button"
                clickable lua "chapterScreen:IsReplayButtonClickable()"
                action
                "
                  chapterScreen:OnReplayButtonClick()
                "
              }
              ```

        - name: chapterScreen:OnDoneButtonClick
          detail: chapterScreen:OnDoneButtonClick()
          doc: |-
              Event action for when the ``Done`` button is clicked.

              **Notes**

              Exits the chapter text screen when this button is clicked.

              The lua ``action`` occurs if the button is enabled (clickable) and is clicked.

              Calls the `tolua_BaldurLUA_CScreenChapter_OnDoneButtonClick00` function.

              **Example**

              The ``Done`` button as defined in ``UI.MENU``:

              ```lua
              button
              {
                area 532 714 234 44
                bam GUIOSTUR
                text "DONE_BUTTON"
                text style "button"
                clickable lua "chapterScreen:IsDoneButtonClickable()"
                action
                "
                  chapterScreen:OnDoneButtonClick()
                "
              }
              ```

        - name: chapterScreen:OnReplayButtonClick
          detail: chapterScreen:OnReplayButtonClick()
          doc: |-
              Event action for when the ``Replay`` button is clicked.

              **Notes**

              The lua ``action`` occurs if the button is enabled (clickable) and is clicked.

              Calls the `tolua_BaldurLUA_CScreenChapter_OnReplayButtonClick00` function.

              **Example**

              The ``Replay`` button as defined in ``UI.MENU``:

              ```lua
              button
              {
                area 280 714 234 44
                bam GUIOSTUL
                text "REPLAY_BUTTON"
                text style "button"
                clickable lua "chapterScreen:IsReplayButtonClickable()"
                action
                "
                  chapterScreen:OnReplayButtonClick()
                "
              }
              ```

        - name: chapterScreen:StartTextScreen
          detail: chapterScreen:StartTextScreen()
          doc: |-
              Load chapter text into UI elements.

              **Parameters**

              * ``string`` *textscreenOverride* -> unknown, process custom `2DA`?

              **Notes**

              - Processes string references (`StrRef`) stored in ``CHPTXT?.2DA`` (where ``?`` is the chapter number). For the ``DEFAULT`` row in the 2DA file, column 0 stores the `StrRef` of the chapter number: *"Chapter 1"* and column 1 stores the `StrRef` of the chapter text: *"Disaster comes on the heels of your victory in Baldur's Gate"...*.
              - Assigns the strings loaded to UI elements.
              - Loads chapter backgrounds, starts music and the scrolling text (? - to be confirmed).
              - Calls the `tolua_BaldurLUA_CScreenChapter_StartTextScreen00` function.

