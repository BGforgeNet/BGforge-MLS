              ```lua
              button
              {
                  area 52 258 302 44
                  bam GUIOSTCL
                  text style "button"
                  text "SPELL_BUTTON"

                  clickable lua "Infinity_GetSpellIdentifyEnabled(characters[id].equipment[selectedSlot].id)"
