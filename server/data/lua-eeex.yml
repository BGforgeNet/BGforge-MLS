              | --- | --- | --- | --- |
              | sprite | CGameSprite |  | The sprite to search around. |
              | aiObjectType | CAIObjectType |  | The AI object type used to filter the objects passed to `func`. <br/> Most commonly retrieved from `EEex_Object_ParseString()`. Remember to call `:free()`. |
              | range | number |  | The radius to search around `sprite`. `448` is a sprite's default visual range. |
              | bCheckForLineOfSight | boolean | `true` | Determines whether LOS is required from `sprite` to considered objects. |
              | bCheckForNonSprites | boolean | `false` | Determines whether non-sprite objects in the main objects list are considered. |
              | terrainTable | Array<byte,16> | `sprite:virtual_GetVisibleTerrainTable()` | The terrain table to use for determining LOS. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | table | See summary. |

        - name: EEex_Sprite_GetAllOfTypeStringInRange
          detail: EEex_Sprite_GetAllOfTypeStringInRange(sprite, aiObjectTypeString, range, bCheckForLineOfSight, bCheckForNonSprites, terrainTable)
          doc: |-
              **Instance Name:** `getAllOfTypeStringInRange`
              
              **Summary**
              
              Returns a table populated by every creature that matches `aiObjectTypeString` around
              `sprite` in the given `range`, as per the `NumCreature()` trigger.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | sprite | CGameSprite |  | The sprite to search around. |
              | aiObjectTypeString | string |  | The AI object type string used to filter the objects added to the return table. <br/> Automatically parsed by `EEex_Object_ParseString()`; the resulting object is freed before return. |
              | range | number |  | The radius to search around `sprite`. `448` is a sprite's default visual range. |
              | bCheckForLineOfSight | boolean | `true` | Determines whether LOS is required from `sprite` to considered objects. |
              | bCheckForNonSprites | boolean | `false` | Determines whether non-sprite objects in the main objects list are considered. |
              | terrainTable | Array<byte,16> | `sprite:virtual_GetVisibleTerrainTable()` | The terrain table to use for determining LOS. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | table | See summary. |

        - name: EEex_Sprite_GetAllSelectedIDs
          detail: EEex_Sprite_GetAllSelectedIDs()
          doc: |-
              **Summary**
              
              Returns a table populated with the object ids of all the sprites the player currently has selected and is controlling.
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | table | See summary. |

