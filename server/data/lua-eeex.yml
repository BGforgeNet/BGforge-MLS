              | object | CGameObject |  | The object to cast. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              |  CGameAIArea | CGameAIBase | CGameAIGame | CGameContainer | CGameDoor | CGameFireball3d | CGameSound | <br/> \CGameSpawning | CGameSprite | CGameStatic | CGameTemporal | CGameTiledObject | CGameTrigger | CObjectMarker | nil  | See summary. |

