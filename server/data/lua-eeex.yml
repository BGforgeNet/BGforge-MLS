              | CGameSprite_UseItem |  |
              | CGameSprite_UseItemPoint |  |

eeex_functions_resource:
    type: 3
    category: eeex_functions
    items:
        - name: EEex_Resource_Demand
          detail: EEex_Resource_Demand()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Resource_ExtToType
          detail: EEex_Resource_ExtToType()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Resource_ExtToUserType
          detail: EEex_Resource_ExtToUserType()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Resource_Fetch
          detail: EEex_Resource_Fetch()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Resource_Find2DAColumnIndex
          detail: EEex_Resource_Find2DAColumnIndex(array, rowIndex, toSearchFor)
          doc: |-
              **Instance Name:** `findColumnIndex`
              
              **Summary**
              
              Searches the values of the row specified by `rowIndex` and returns the first column index that matches `toSearchFor`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              | rowIndex | number |  | The index of the row to be searched. |
              | toSearchFor | string |  | The value to search for. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | number | See summary. |

        - name: EEex_Resource_Find2DAColumnLabel
          detail: EEex_Resource_Find2DAColumnLabel(array, toSearchFor)
          doc: |-
              **Instance Name:** `findColumnLabel`
              
              **Summary**
              
              Searches the .2DA's column labels and returns the first column index that matches `toSearchFor`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              | toSearchFor | string |  | The label to search for. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | number | See summary. |

        - name: EEex_Resource_Find2DARowIndex
          detail: EEex_Resource_Find2DARowIndex(array, columnIndex, toSearchFor)
          doc: |-
              **Instance Name:** `findRowIndex`
              
              **Summary**
              
              Searches the values of the column specified by `columnIndex` and returns the first row index that matches `toSearchFor`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              | columnIndex | number |  | The index of the column to be searched. |
              | toSearchFor | string |  | The value to search for. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | number | See summary. |

        - name: EEex_Resource_Find2DARowLabel
          detail: EEex_Resource_Find2DARowLabel(array, toSearchFor)
          doc: |-
              **Instance Name:** `findRowLabel`
              
              **Summary**
              
              Searches the .2DA's row labels and returns the first row index that matches `toSearchFor`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              | toSearchFor | string |  | The label to search for. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | number | See summary. |

        - name: EEex_Resource_Free2DA
          detail: EEex_Resource_Free2DA(array)
          doc: |-
              **Instance Name:** `free`
              
              **Summary**
              
              Frees the memory associated with `array`. ***Only use this if you know what you are doing!***
              
              **Note**
              `C2DArray` objects returned by `EEex_Resource_Load2DA()` are subject to garbage-collection
              – meaning `EEex_Resource_Free2DA()` should ***not*** be called on these instances.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |

        - name: EEex_Resource_FreeIDS
          detail: EEex_Resource_FreeIDS(ids)
          doc: |-
              **Instance Name:** `free`
              
              **Summary**
              
              Frees the memory associated with `ids`. ***Only use this if you know what you are doing!***
              
              **Note**
              `CAIIdList` objects returned by `EEex_Resource_LoadIDS()` are subject to garbage-collection
              – meaning `EEex_Resource_FreeIDS()` should ***not*** be called on these instances.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | ids | CAIIdList |  | The .IDS file being operated on. This is usually the object returned by `EEex_Resource_LoadIDS()`. |

        - name: EEex_Resource_FreeScript
          detail: EEex_Resource_FreeScript(script)
          doc: |-
              **Instance Name:** `free`
              
              **Summary**
              
              Frees the memory associated with `script`. ***Only use this if you know what you are doing!***
              
              **Note**
              `CAIScript` objects returned by `EEex_Resource_LoadScript()` are subject to garbage-collection
              – meaning `EEex_Resource_FreeScript()` should ***not*** be called on these instances.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | script | CAIScript |  | The .BCS / .BS file being operated on. This is usually the object returned by `EEex_Resource_LoadScript()`. |

        - name: EEex_Resource_Get2DAColumnLabel
          detail: EEex_Resource_Get2DAColumnLabel(array, columnIndex)
          doc: |-
              **Instance Name:** `getColumnLabel`
              
              **Summary**
              
              Returns the label of the column specified by `columnIndex`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The .2DA file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              | columnIndex | number |  | The column index of the label to be fetched. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | string | See summary. |

        - name: EEex_Resource_Get2DADefault
          detail: EEex_Resource_Get2DADefault(array)
          doc: |-
              **Instance Name:** `getDefault`
              
              **Summary**
              
              Returns the "default" value of the `.2DA`.
              
              **Note**
                - A `.2DA`'s default value is defined by the line directly below the version header – it is usually an asterisk ('*').
                - If the engine (or any EEex function) indexes a `.2DA` out-of-bounds, the default value is returned instead.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The `.2DA` file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | string | See summary. |

        - name: EEex_Resource_Get2DADimensions
          detail: EEex_Resource_Get2DADimensions(array)
          doc: |-
              **Instance Name:** `getDimensions`
              
              **Summary**
              
              Returns the x and y dimensions of the `.2DA`. That is the number of columns, and the number of rows respectively.
              
              **Note**
              * The returned 'x' dimension **includes** the row labels, (that is to say, its value is 1 more than expected).
              * The returned 'y' dimension **excludes** the column labels.
              
              When indexing a `.2DA`, column / row labels **are always excluded**.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | array | C2DArray |  | The `.2DA` file being operated on. This is usually the object returned by `EEex_Resource_Load2DA()`. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | number | The `.2DA`'s 'x' dimension. |
              | number | The `.2DA`'s 'y' dimension. |

