        - name: EEex_Resource_Load2DA
          detail: EEex_Resource_Load2DA(resref)
          doc: |-
              **Summary**
              
              Returns a `C2DArray` instance that represents the `.2DA` with `resref`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | resref | string |  | The resref of the `.2DA` to be loaded – (should omit the file extension). |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | C2DArray | See summary. |

        - name: EEex_Resource_LoadIDS
          detail: EEex_Resource_LoadIDS(resref, cacheAsArray)
          doc: |-
              **Summary**
              
              Returns a `CAIIdList` instance that represents the `.IDS` with `resref`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | resref | string |  | The resref of the `.IDS` to be loaded – (should omit the file extension). |
              | cacheAsArray | boolean | `false` | If `true`, internally builds an array that maps every id of the `.IDS` to its corresponding `CAIId` entry in the <br/> range [0, <max id in `.IDS>`]. <br/>  <br/> Setting this parameter to `true` can speed up entry lookups for the returned `CAIIdList` instance – ***however***\, <br/> care must be taken that the given `.IDS` does not have a large max id value. <br/>  <br/> For example, it would be a bad idea to load `KIT.IDS` with `cacheAsArray=true`, as the max id of `KIT.IDS`, <br/> `0x80000000`, would cause the `CAIIdList` instance to attempt to allocate an array that has a size of <br/> `(0x80000000 + 1) * 8 bytes` ***= ~16 gigabytes!*** |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | CAIIdList | See summary. |

        - name: EEex_Resource_LoadScript
          detail: EEex_Resource_LoadScript(resref, bPlayerScript)
          doc: |-
              **Summary**
              
              Returns a `CAIScript` instance that represents the `.BCS` / `.BS` with `resref`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | resref | string |  | The resref of the `.BCS` / `.BS` to be loaded – (should omit the file extension). |
              | bPlayerScript | boolean | `false` | If `true`, signifies that `resref` has the extension `.BS` instead of `.BCS`. <br/>  <br/> **Note:** Due to the enhanced edition’s use of script caching, the engine has trouble <br/> differentiating between `.BS` and `.BCS` files with the same name. If a script <br/> with the given `resref` has already been loaded by the engine, that script will be <br/> used, regardless of `bPlayerScript`. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | CAIScript | See summary. |

