        - name: EEex_Options_Check
          detail: EEex_Options_Check(id, value)
          doc: |-
              **Summary**
              
              Checks if the option with the given `id` exists and is equal to the given `value`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | id | string |  | The id of the option whose value is to be checked. |
              | value | `<non-nil>` |  | The value to check against the option. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | boolean | `true` if the option with `id` exists and it is equal to the given `value`; `false` otherwise. |

        - name: EEex_Options_Close
          detail: EEex_Options_Close()
          doc: |-
              **Summary**
              
              Closes the "EEex Options" menu if it is currently open.

        - name: EEex_Options_Get
          detail: EEex_Options_Get(id)
          doc: |-
              **Summary**
              
              Returns the option object with the given `id`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | id | string |  | The id of the option to be fetched. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | EEex_Options_Option | nil | See summary / `The Option Table ` for more details. |

        - name: EEex_Options_MarshalKeybind
          detail: EEex_Options_MarshalKeybind(keybind)
          doc: |-
              **Summary**
              
              Returns a string representing the given `keybind` table.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | keybind | table |  | A table representing the keybind to marshal. <br/> See `The Keybind Table ` for more details. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | string | See summary. |

        - name: EEex_Options_Open
          detail: EEex_Options_Open(o)
          doc: |-
              **Summary**
              
              Opens the "EEex Options" menu if it is currently closed.
              
              .. _EEex_Options_Option.new:
              
              EEex_Options_Option.new
              
              **Summary**
              
              Creates a new `EEex_Options_Option` instance.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | o | table | `{}` | The object to become the `EEex_Options_Option` instance. <br/> See `The Option Table ` for more details. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | EEex_Options_Option | See summary. |
              
              
              **The Option Table**
              
              | Key | Value Type | Description |
              | --- | --- | --- |
              | accessor | EEex_Options_Accessor | This field is currently undocumented. |
              | default | `<non-nil>` | This field is currently undocumented. |
              | requiresRestart | boolean | This field is currently undocumented. |
              | storage | EEex_Options_Private_Storage | This field is currently undocumented. |
              
              
              EEex_Options_Option:get()
              
              **Summary**
              
              Returns the current, in-effect value of the option.
              
              **Note**
              Some options delay applying changes made to their value; these changes
              will only be visible at a later time, such as after a restart.
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | `<non-nil>` | See summary. |
              
              
              EEex_Options_Option:getDefault()
              
              **Summary**
              
              Returns the default value of the option.
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | `<non-nil>` | See summary. |
              
              
              EEex_Options_Option:set()
              
              **Summary**
              
              Sets the value of the option.
              
              **Note**
              Some options delay applying changes made to their value; these changes
              will only be visible at a later time, such as after a restart.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | newValue | `<any>` |  | The value to set the option to. <br/> If `nil`, sets the option to its default value. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | `<non-nil>` | Returns the value the option was set to after constraints were applied to `newValue`. |

        - name: EEex_Options_Register
          detail: EEex_Options_Register(id, option)
          doc: |-
              **Summary**
              
              Registers `option` under `id`. Options must be registered to be functional.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | id | string |  | The unique id to register `option` under. |
              | option | EEex_Options_Option |  | The option being registered. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | EEex_Options_Option | Returns `option`. |

        - name: EEex_Options_UnmarshalKeybind
          detail: EEex_Options_UnmarshalKeybind(keybindStr)
          doc: |-
              **Summary**
              
              Returns a table representing the given `keybindStr` string.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | keybindStr | string |  | A string representing the keybind to unmarshal. <br/> This string is of the format `<SDL key name>+<SDL key name>... | <UP or DOWN>` |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | table | See summary / `The Keybind Table ` for more details. |

eeex_functions_projectile:
    type: 3
    category: eeex_functions
    items:
        - name: EEex_Projectile_CastUserType
          detail: EEex_Projectile_CastUserType(projectile)
          doc: |-
              **Aliases:** `EEex_Projectile_CastUT`
              
              **Summary**
              
              Takes the given `projectile` and returns a cast userdata that represents `projectile`'s true type.
              
              Most EEex functions will call this function before passing a projectile to the modder API.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | projectile | CProjectile |  | The projectile to cast. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              |  CProjectile | CProjectileAmbiant | CProjectileArea | <br/> \CProjectileBAM | CProjectileCallLightning | CProjectileCastingGlow | <br/> \CProjectileChain | CProjectileColorSpray | CProjectileConeOfCold | <br/> \CProjectileFall | CProjectileFireHands | CProjectileInstant | <br/> \CProjectileInvisibleTravelling | CProjectileLightningBolt | CProjectileLightningBoltGround | <br/> \CProjectileLightningBounce | CProjectileLightningStorm | CProjectileMagicMissileMulti | <br/> \CProjectileMulti | CProjectileMushroom | CProjectileNewScorcher | <br/> \CProjectileScorcher | CProjectileSegment | CProjectileSkyStrike | <br/> \CProjectileSkyStrikeBAM | CProjectileSpellHit | CProjectileTravelDoor | nil  | See summary. |

        - name: EEex_Projectile_GetStartingPos
          detail: EEex_Projectile_GetStartingPos()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Projectile_GetStartingPosForID
          detail: EEex_Projectile_GetStartingPosForID()
          doc: |-
              This function is currently undocumented.

        - name: EEex_Projectile_GetType
          detail: EEex_Projectile_GetType(projectile)
          doc: |-
              **Instance Name:** `getType`
              
              **Summary**
              
              Returns the `EEex_Projectile_Type` of the given `projectile`.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | projectile | CProjectile |  | The projectile whose type is being fetched. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | EEex_Projectile_Type | See summary. |
              
              **EEex_Projectile_Type**
              | Name | Description |
              | --- | --- |
              | Unknown |  |
              | CProjectile |  |
              | CProjectileAmbiant |  |
              | CProjectileArea |  |
              | CProjectileBAM |  |
              | CProjectileChain |  |
              | CProjectileColorSpray |  |
              | CProjectileConeOfCold |  |
              | CProjectileFall |  |
              | CProjectileFireHands |  |
              | CProjectileInstant |  |
              | CProjectileMulti |  |
              | CProjectileMushroom |  |
              | CProjectileNewScorcher |  |
              | CProjectileScorcher |  |
              | CProjectileSegment |  |
              | CProjectileSkyStrike |  |
              | CProjectileSkyStrikeBAM |  |
              | CProjectileSpellHit |  |
              | CProjectileTravelDoor |  |

        - name: EEex_Projectile_IsOfType
          detail: EEex_Projectile_IsOfType(projectile, checkType)
          doc: |-
              **Instance Name:** `isOfType`
              
              **Summary**
              
              Returns `true` if `projectile` has the type `checkType` or is a derivative thereof.
              
              This is useful to ensure that a projectile is of a certain type before accessing members
              it may or may not have.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | projectile | CProjectile |  | The projectile whose type is being checked. |
              | checkType | EEex_Projectile_Type |  | The type to check against. |
              
              **Return Values:**
              
              | **Type** | **Description** |
              | --- | --- |
              | boolean | See summary. |

        - name: EEex_Projectile_RegisterGlobalMutator
          detail: EEex_Projectile_RegisterGlobalMutator(mutatorTableName, Name, context, Context Key, decodeSource, originatingEffect, originatingSprite, projectileType)
          doc: |-
              **Summary**
              
              Registers a global Lua table as a global (always processed) projectile mutator.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | mutatorTableName | string |  | The name of the table to register. |
              
              **The Mutator Table**
              
              A mutator table can contain three optional keys, each of which should be assigned a respective mutator function.
              
              The valid function keys are: `typeMutator`, `projectileMutator`, and `effectMutator`:
              
              **typeMutator**
              
              **Parameters:**
              
              | Name | Type | Description |
              | --- | --- | --- |
              | context | table | A table containing the context of the hook. |
              
              `context` **keys:**
              
              | Context Key | Value Type | Description |
              | --- | --- | --- |
              | decodeSource | EEex_Projectile_DecodeSource | The source of the hook, such as `EEex_Projectile_DecodeSource.CGameSprite_Spell`                           <br/> |
              |  |  | for the `Spell()` action, `EEex_Projectile_DecodeSource.CGameSprite_SpellPoint`                          <br/> |
              |  |  | for the `SpellPoint()` action, etc. |
              | originatingEffect | CGameEffect | nil | The op408 (ProjectileMutator) effect that registered the containing mutator table.                           <br/> <br/> |
              |  |  |  |
              |  |  | This is always `nil` for global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`. |
              | originatingSprite | CGameSprite | nil | The sprite that is decoding (creating) the projectile.                                                       <br/> <br/> |
              |  |  |  |
              |  |  | Global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`                             <br/> |
              |  |  | also run for non-sprite decode sources; in these cases this is `nil`. |
              | projectileType | number | The projectile type about to be decoded.                                                                     <br/> <br/> |
              |  |  |  |
              |  |  | This is equivalent to the value at `.SPL->Ability Header->[+0x26]`.                                        <br/> <br/> |
              |  |  |  |
              |  |  | Subtract one from this value to get the corresponding `PROJECTL.IDS` index. |
              
              **Return Values:**
              
              | Type | Description |
              | --- | --- |
              | number | nil | The new projectile type, or `nil` if the type should not be overridden.     <br/> <br/> |
              |  |  |
              |  | This is equivalent to the value at `.SPL->Ability Header->[+0x26]`.         <br/> <br/> |
              |  |  |
              |  | Subtract one from this value to get the corresponding `PROJECTL.IDS` index. |
              
              **projectileMutator**
              
              **Parameters:**
              
              | Name | Type | Description |
              | --- | --- | --- |
              | context | table | A table containing the context of the hook. |
              
              `context` **keys:**
              
              | Context Key | Value Type | Description |
              | --- | --- | --- |
              | decodeSource | EEex_Projectile_DecodeSource | The source of the hook, such as `EEex_Projectile_DecodeSource.CGameSprite_Spell`                           <br/> |
              |  |  | for the `Spell()` action, `EEex_Projectile_DecodeSource.CGameSprite_SpellPoint`                          <br/> |
              |  |  | for the `SpellPoint()` action, etc. |
              | originatingEffect | CGameEffect | nil | The op408 (ProjectileMutator) effect that registered the containing mutator table.                           <br/> <br/> |
              |  |  |  |
              |  |  | This is always `nil` for global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`. |
              | originatingSprite | CGameSprite | nil | The sprite that is decoding (creating) the projectile.                                                       <br/> <br/> |
              |  |  |  |
              |  |  | Global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`                             <br/> |
              |  |  | also run for non-sprite decode sources; in these cases this is `nil`. |
              | projectile | CProjectile | The projectile about to be returned from the decoding process. |
              
              **effectMutator**
              
              **Parameters:**
              
              | Name | Type | Description |
              | --- | --- | --- |
              | context | table | A table containing the context of the hook. |
              
              `context` **keys:**
              
              | Context Key | Value Type | Description |
              | --- | --- | --- |
              | addEffectSource | EEex_Projectile_AddEffectSource | The source of the hook, such as `EEex_Projectile_AddEffectSource.CGameSprite_Spell`                           <br/> |
              |  |  | for the `Spell()` action, `EEex_Projectile_AddEffectSource.CGameSprite_SpellPoint`                          <br/> |
              |  |  | for the `SpellPoint()` action, etc. |
              | effect | CGameEffect | The effect that is being added to `projectile`. |
              | originatingEffect | CGameEffect | nil | The op408 (ProjectileMutator) effect that registered the containing mutator table.                           <br/> <br/> |
              |  |  |  |
              |  |  | This is always `nil` for global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`. |
              | originatingSprite | CGameSprite | nil | The sprite that decoded (created) the projectile.                                                            <br/> <br/> |
              |  |  |  |
              |  |  | Global mutator tables registered via `EEex_Projectile_RegisterGlobalMutator()`                             <br/> |
              |  |  | also run for non-sprite sources; in these cases this is `nil`. |
              | projectile | CProjectile | The projectile that `effect` is being added to. |
              
              **EEex_Projectile_DecodeSource**
              | Name | Description |
              | --- | --- |
              | CBounceList_Add |  |
              | CGameAIBase_FireItem |  |
              | CGameAIBase_FireItemPoint |  |
              | CGameAIBase_FireSpell |  |
              | CGameAIBase_FireSpellPoint |  |
              | CGameAIBase_ForceSpell |  |
              | CGameAIBase_ForceSpellPoint |  |
              | CGameEffect_FireSpell |  |
              | CGameEffectCastingGlow_ApplyEffect |  |
              | CGameEffectChangeStatic_ApplyEffect |  |
              | CGameEffectSummon_ApplyVisualEffect |  |
              | CGameEffectVisualSpellHitIWD_ApplyEffect |  |
              | CGameSprite_Spell |  |
              | CGameSprite_SpellPoint |  |
              | CGameSprite_Swing |  |
              | CGameSprite_UpdateAOE |  |
              | CGameSprite_UseItem |  |
              | CGameSprite_UseItemPoint |  |
              | CMessageFireProjectile_Run |  |
              | CProjectile_DecodeProjectile_MultiMagicMissile |  |
              | CProjectile_DecodeProjectile_ChainCallLightning |  |
              | CProjectile_DecodeProjectile_MultiProjectile |  |
              | CProjectileArea_CreateSecondary |  |
              | CProjectileArea_Explode |  |
              | CProjectileChain_AIUpdate |  |
              | CProjectileChain_Fire |  |
              | CProjectileFall_AIUpdate |  |
              
              **EEex_Projectile_AddEffectSource**
              | Name | Description |
              | --- | --- |
              | CBounceList_Add |  |
              | CGameAIBase_FireItem |  |
              | CGameAIBase_FireItemPoint |  |
              | CGameAIBase_FireSpell |  |
              | CGameAIBase_FireSpellPoint |  |
              | CGameAIBase_ForceSpell |  |
              | CGameAIBase_ForceSpellPoint |  |
              | CGameEffect_FireSpell |  |
              | CGameSprite_LoadProjectile |  |
              | CGameSprite_Spell |  |
