        - name: EEex_Resource_IterateIDSEntries
          detail: EEex_Resource_IterateIDSEntries(ids, func)
          doc: |-
              **Instance Name:** `iterateEntries`
              
              **Summary**
              
              Calls `func` for every `CAIId` entry of the `.IDS`. If `func` returns `true` the iteration ends early.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | ids | CAIIdList |  | The `.IDS` file being operated on. This is usually the object returned by `EEex_Resource_LoadIDS()`. |
              | func | function(entry: CAIId) -> boolean |  | The function to be called. |

        - name: EEex_Resource_IterateUnpackedIDSEntries
          detail: EEex_Resource_IterateUnpackedIDSEntries(ids, func)
          doc: |-
              **Instance Name:** `iterateUnpackedEntries`
              
              **Summary**
              
              Calls `func` for every `CAIId` entry of the `.IDS`, unpacking the entry's members for convenience.
              If `func` returns `true` the iteration ends early.
              
              **Parameters:**
              
              | **Name** | **Type** | **Default Value** | **Description** |
              | --- | --- | --- | --- |
              | ids | CAIIdList |  | The `.IDS` file being operated on. This is usually the object returned by `EEex_Resource_LoadIDS()`. |
              | func | function(id: number, line: string, start: string) -> boolean |  | The function to be called. <br/>  <br/> `id` – the entry's numerical value. <br/> `line` – the entry's complete symbol value. <br/> `start` – the entry's symbol value up until (and not including) the first '(' character. |

