        - name: EEex_Key_IsDown
          detail: EEex_Key_IsDown(key)
          doc: |-
              **Summary**
              
              Returns `true` if the given `key` is currently pressed. See `SDL_Keycode` for valid `key` values.
              
              It is recommended to use `EEex_Key_GetFromName` if you are unsure which `SDL_Keycode` matches the desired character.
              
